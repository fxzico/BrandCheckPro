
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrandCheck Pro — Enterprise Pre-Crisis Firewall</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "BrandCheck Pro",
    "url": "https://www.brandcheckpro.in",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "All",
    "description": "Enterprise Pre-Crisis Linguistic Firewall and Compliance Sandbox assessing copywriting against socio-cultural risk anomalies in India.",
    "browserRequirements": "Requires HTML5 and JavaScript.",
    "offers": {
      "@type": "Offer",
      "price": "3999",
      "priceCurrency": "INR",
      "category": "Professional Tier Subscription"
    }
  }
  </script>

  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

  <!-- CSS Assets -->
  <link rel="stylesheet" href="assets/css/custom.css">
  <script src="https://cdn.tailwindcss.com" defer></script>
  <!-- Google Sign-In SDK & Auth Utility -->
  <script src="assets/js/auth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- JS Assets & Engine Core -->
  <script src="assets/js/sandbox.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brandBgDark: '#0B0F19',
            brandSurfaceDark: '#1E293B',
            brandBgLight: '#F8FAFC',
            brandSurfaceLight: '#FFFFFF',
            brandNeon: '#38BDF8',
            brandBlue: '#2563EB',
          }
        }
      }
    }
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body 
  class="transition-colors duration-200 font-sans antialiased" 
  :class="darkMode ? 'dark bg-brandBgDark text-slate-100' : 'bg-brandBgLight text-slate-800'"
  x-data="brandCheckApp()"
  x-cloak
>

  <!-- Global Banner Notice -->
  <div class="bg-brandBlue text-white text-center py-2.5 px-4 text-xs font-semibold tracking-wide border-b border-blue-700/50 h-10 block">
    🔒 AGENCY SECURITY ACTIVE: Zero-Data Retention Pipeline enabled. Input payloads are processed entirely in volatile RAM and deleted immediately post-analysis. No data footprints are generated or stored.
  </div>

  <!-- Header Navigation -->
  <nav class="border-b transition-colors duration-200 sticky top-0 z-40 px-6 py-4"
       :class="darkMode ? 'border-slate-800 bg-brandBgDark/85 backdrop-blur-md' : 'border-slate-200 bg-brandBgLight/85 backdrop-blur-md'">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.reload()">
        <div class="w-3 h-3 bg-brandNeon rounded-full shadow-[0_0_10px_#38BDF8]" style="width:12px; height:12px;"></div>
        <span class="text-xl font-bold tracking-tight font-display">BrandCheck <span class="text-brandNeon">Pro</span></span>
      </div>
      
      <div class="hidden md:flex items-center gap-8 text-sm font-medium">
        <a href="index.html" class="text-brandNeon font-semibold transition">Dashboard</a>
        <a href="blog.html" :class="darkMode ? 'text-slate-300 hover:text-brandNeon' : 'text-slate-600 hover:text-brandNeon'" class="transition">Brand Stories</a>
        <a href="origin.html" :class="darkMode ? 'text-slate-300 hover:text-brandNeon' : 'text-slate-600 hover:text-brandNeon'" class="transition">Origin</a>
        <a href="pricing.html" :class="darkMode ? 'text-slate-300 hover:text-brandNeon' : 'text-slate-600 hover:text-brandNeon'" class="transition">Pricing</a>
        <a href="api-connector.html" :class="darkMode ? 'text-slate-300 hover:text-brandNeon' : 'text-slate-600 hover:text-brandNeon'" class="transition">Developer Portal</a>
      </div>

      <div class="flex items-center gap-4">
        <!-- Connection Status Indicator Pill -->
        <span x-show="cloudEngineKey" class="hidden sm:inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-mono font-semibold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
          LIVE AI PIPELINE
        </span>

        <!-- Connection Toggle -->
        <button @click="connectionModal = true" class="p-2 rounded-full hover:bg-slate-500/10 transition relative group" aria-label="Connect Cloud Engine" title="Connect Cloud Engine">
          <span class="text-slate-400 hover:text-brandNeon transition text-sm">⚙️</span>
          <!-- Sleek tooltip -->
          <span class="absolute top-10 right-0 scale-0 group-hover:scale-100 transition-all duration-100 bg-slate-800 text-[10px] text-white px-2 py-1 rounded font-mono whitespace-nowrap z-50">Connect Cloud Engine</span>
        </button>

        <!-- Theme Toggle -->
        <button @click="darkMode = !darkMode; localStorage.setItem('theme', darkMode ? 'dark' : 'light'); if (darkMode) { document.documentElement.classList.add('dark'); } else { document.documentElement.classList.remove('dark'); }" class="p-2 rounded-full hover:bg-slate-500/10 transition relative group" aria-label="Toggle Theme" title="Toggle Theme">
          <span x-show="darkMode" class="text-amber-400">☀️</span>
          <span x-show="!darkMode" class="text-slate-400 hover:text-slate-600">🌙</span>
          <span class="absolute top-10 right-0 scale-0 group-hover:scale-100 transition-all duration-100 bg-slate-800 text-[10px] text-white px-2 py-1 rounded font-mono whitespace-nowrap z-50">Toggle Theme</span>
        </button>

        <!-- Google OAuth Authentication Flow -->
        <!-- Signed-Out State -->
        <div x-show="!user">
          <button @click="authModal = true" class="border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 hover:bg-slate-500/10 font-semibold px-4 py-2 rounded-md text-xs transition">
            Sign In
          </button>
        </div>

        <!-- Signed-In State -->
        <div x-show="user" class="relative" @click.away="userDropdown = false" x-cloak>
          <button @click="userDropdown = !userDropdown" class="flex items-center gap-2 px-2.5 py-1 rounded-full border border-slate-300 dark:border-slate-800 bg-white dark:bg-slate-900 hover:bg-slate-500/10 dark:hover:bg-slate-800 transition">
            <img :src="user ? user.picture : ''" alt="User Avatar" class="w-5 h-5 rounded-full border border-brandNeon" referrerpolicy="no-referrer" style="width:20px; height:20px;">
            <span class="text-xs font-semibold text-slate-700 dark:text-slate-200" x-text="user ? user.given_name : ''"></span>
            <span class="text-[9px] text-slate-400 dark:text-slate-500">▼</span>
          </button>
          
          <!-- Dropdown Card -->
          <div x-show="userDropdown" x-transition class="absolute right-0 mt-2 w-48 rounded-md shadow-lg py-1 border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 z-50">
            <div class="px-4 py-2 border-b border-slate-200 dark:border-slate-800">
              <p class="text-xs font-bold text-slate-800 dark:text-slate-200 truncate" x-text="user ? user.name : ''"></p>
              <p class="text-[10px] text-slate-500 dark:text-slate-400 truncate" x-text="user ? user.email : ''"></p>
            </div>
            <button @click="signOut()" class="w-full text-left px-4 py-2 text-xs text-red-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition font-semibold">
              Sign Out
            </button>
          </div>
        </div>

        <a href="pricing.html" class="bg-brandBlue text-white font-semibold px-4 py-2 rounded-md text-xs hover:opacity-90 transition shadow-lg shadow-blue-600/20">
          Enterprise Access
        </a>
      </div>
    </div>
  </nav>

  <!-- Main Workspace Dashboard & Sandbox -->
  <main class="max-w-6xl mx-auto py-16 px-6">
    <div class="mb-10 text-center md:text-left">
      <span class="text-xs font-bold tracking-widest text-brandNeon uppercase bg-brandNeon/10 px-3 py-1 rounded-full border border-brandNeon/20">Product Workspace Dashboard</span>
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mt-4" :class="darkMode ? 'text-white' : 'text-slate-900'">
        Linguistic Compliance Sandbox
      </h1>
      <p class="text-sm mt-2 max-w-xl" :class="darkMode ? 'text-slate-400' : 'text-slate-600'">
        Stress-test your marketing copy against socio-cultural, religious, and political risk anomalies.
      </p>
    </div>

    <!-- Live Workspace Split Pane -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-20 min-h-[700px] content-start">
      
      <!-- LEFT PANEL: 3-Step Conversational Input Wizard -->
      <section class="lg:col-span-5 glass-card rounded-xl p-6 flex flex-col justify-between min-h-[500px]" :class="darkMode ? 'bg-brandSurfaceDark/40' : 'bg-brandSurfaceLight shadow-sm'">
        <div>
          <!-- Wizard Header -->
          <div class="flex items-center justify-between border-b pb-4 mb-6" :class="darkMode ? 'border-slate-800' : 'border-slate-100'">
            <h2 class="text-sm font-mono font-bold tracking-wider text-brandNeon">INPUT CONFIGURATION</h2>
            <span class="text-xs font-mono text-slate-500" x-text="`Step ${wizardStep} of 3`"></span>
          </div>

          <!-- STEP 1 VIEW -->
          <div x-show="wizardStep === 1" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform -translate-x-2" x-transition:enter-end="opacity-100 transform translate-x-0" class="space-y-4">
            <label class="block text-xs font-mono font-bold tracking-wide text-slate-400 uppercase">Brand / Product Context</label>
            <textarea 
              x-model="brandContext"
              @input="brandContextWarning = false"
              placeholder="e.g., A premium consumer beverage campaign promoting a summer festive discount for urban families..." 
              class="w-full h-32 p-3 text-xs border rounded-lg focus:outline-none focus:border-brandNeon/50 transition font-sans"
              :class="darkMode ? 'bg-slate-900 border-slate-800 text-white placeholder-slate-500' : 'bg-white border-slate-200 text-slate-800 placeholder-slate-400'"
            ></textarea>
            <div x-show="brandContextWarning" x-transition class="text-xs text-rose-500 font-semibold bg-rose-500/10 border border-rose-500/20 rounded p-2.5 mt-2">
              Please provide a brand name, website URL, or product category context to help the engine accurately calibrate safety thresholds.
            </div>
            <p class="text-[11px] text-slate-500">Provide high-level campaign context to calibrate standard model safety thresholds.</p>
          </div>

          <!-- STEP 2 VIEW -->
          <div x-show="wizardStep === 2" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform -translate-x-2" x-transition:enter-end="opacity-100 transform translate-x-0" class="space-y-4">
            <label class="block text-xs font-mono font-bold tracking-wide text-slate-400 uppercase">Target Demographics & Region</label>
            <select 
              x-model="demographics"
              class="w-full p-3 text-xs bg-slate-950 border rounded-lg focus:outline-none focus:border-brandNeon/50 transition"
              :class="darkMode ? 'border-slate-800 text-white' : 'border-slate-300 text-slate-900'"
            >
              <option value="Whole India Market">Whole India Market</option>
              <option value="Tier 1 Market">Tier 1 Market</option>
              <option value="Tier 2 Market">Tier 2 Market</option>
              <option value="Tier 3 Market and Beyond">Tier 3 Market and Beyond</option>
              <option value="Other (Specify)">Other (Specify)</option>
            </select>
            <p class="text-[11px] text-slate-500">Aligning regions updates regional double-entendres and socio-political indexes.</p>
          </div>

          <!-- STEP 3 VIEW -->
          <div x-show="wizardStep === 3" x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 transform -translate-x-2" x-transition:enter-end="opacity-100 transform translate-x-0" class="space-y-4">
            <!-- Campaign copy text area -->
            <div>
              <label class="block text-xs font-mono font-bold tracking-wide text-slate-400 uppercase mb-2">Campaign Copy / Slogan</label>
              <textarea 
                x-model="campaignCopy"
                placeholder="Type or paste copy slogan text here to evaluate..." 
                class="w-full h-24 p-3 text-xs border rounded-lg focus:outline-none focus:border-brandNeon/50 transition font-sans"
                :class="darkMode ? 'bg-slate-900 border-slate-800 text-white placeholder-slate-500' : 'bg-white border-slate-200 text-slate-800 placeholder-slate-400'"
              ></textarea>
            </div>
            
            <!-- Analysis Engine Selection -->
            <div>
              <label class="block text-xs font-mono font-bold tracking-wide text-slate-400 uppercase mb-2">Analysis Engine</label>
              <select 
                x-model="selectedEngine"
                class="w-full p-2.5 text-xs bg-slate-950 border rounded-lg focus:outline-none focus:border-brandNeon/50 transition"
                :class="darkMode ? 'border-slate-800 text-white' : 'border-slate-300 text-slate-900'"
              >
                <option value="tier1">High-Priority Engine (Recommended)</option>
                <option value="standard">Standard Contextual Core</option>
                <option value="advanced">Multi-Pass Advanced Reasoning</option>
              </select>
            </div>

            <!-- Risk Sensitivity Levels -->
            <div>
              <label class="block text-xs font-mono font-bold tracking-wide text-slate-400 uppercase mb-2">Risk Sensitivity Level</label>
              <div class="flex gap-2">
                <template x-for="lvl in ['Low', 'Standard', 'Maximum']">
                  <button 
                    @click="sensitivity = lvl"
                    type="button"
                    class="flex-1 py-1.5 rounded text-xs font-medium border transition"
                    :class="sensitivity === lvl ? 'bg-brandBlue text-white border-brandBlue' : (darkMode ? 'border-slate-800 text-slate-400 hover:border-slate-700' : 'border-slate-200 text-slate-600 hover:border-slate-300')"
                    x-text="lvl"
                  ></button>
                </template>
              </div>
            </div>

            <!-- Advanced Sarcasm / Dialect Analysis Filter (Pro Feature Gate) -->
            <div>
              <div class="flex items-center justify-between p-3 rounded-lg border transition"
                   :class="darkMode ? 'border-slate-800 bg-slate-900/40' : 'border-slate-200 bg-slate-50'">
                <div class="flex flex-col gap-0.5">
                  <span class="text-xs font-mono font-bold tracking-wide text-slate-400 uppercase">Sarcasm &amp; Dialect Filter</span>
                  <span class="text-[10px] text-slate-500 leading-tight">Advanced regional slang &amp; irony detection</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="premium-badge">Pro</span>
                  <button
                    @click="tryToggleSarcasm()"
                    type="button"
                    class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors duration-200 focus:outline-none"
                    :class="sarcasmFilterEnabled ? 'bg-brandNeon' : (darkMode ? 'bg-slate-700' : 'bg-slate-300')"
                    :aria-checked="sarcasmFilterEnabled"
                    role="switch"
                    aria-label="Toggle Sarcasm Filter"
                  >
                    <span
                      class="inline-block h-3.5 w-3.5 transform rounded-full bg-white shadow-sm transition-transform duration-200"
                      :class="sarcasmFilterEnabled ? 'translate-x-4' : 'translate-x-0.5'"
                    ></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Wizard Navigation Buttons -->
        <div class="flex items-center gap-3 mt-8 pt-4 border-t" :class="darkMode ? 'border-slate-800' : 'border-slate-100'">
          <button 
            x-show="wizardStep > 1"
            @click="wizardStep--"
            type="button"
            class="px-4 py-2 rounded text-xs font-semibold border transition hover:opacity-85"
            :class="darkMode ? 'border-slate-800 text-slate-300' : 'border-slate-300 text-slate-700'"
          >
            ← Back
          </button>
          
          <button 
            x-show="wizardStep < 3"
            @click="nextStep()"
            type="button"
            class="flex-1 bg-brandBlue text-white py-2 rounded text-xs font-bold hover:opacity-95 transition text-center shadow-lg shadow-blue-600/10"
          >
            Next Step →
          </button>
          
          <button 
            x-show="wizardStep === 3"
            @click="runComplianceCheck()"
            type="button"
            class="flex-1 bg-brandNeon text-slate-950 py-2 rounded text-xs font-extrabold hover:opacity-95 transition text-center shadow-lg shadow-cyan-400/10"
          >
            RUN COMPLIANCE CHECK
          </button>
        </div>
      </section>

      <!-- RIGHT PANEL: Live Visual Results Terminal -->
      <section class="lg:col-span-7 glass-card rounded-xl p-6 flex flex-col justify-between min-h-[400px]" :class="darkMode ? 'bg-brandSurfaceDark/40' : 'bg-brandSurfaceLight shadow-sm'">
        <div>
          <!-- Panel Header -->
          <div class="flex items-center justify-between border-b pb-4 mb-6" :class="darkMode ? 'border-slate-800' : 'border-slate-100'">
            <h2 class="text-sm font-mono font-bold tracking-wider text-brandNeon">COMPLIANCE ANALYSIS OUTPUT</h2>
            <div class="flex items-center gap-1.5">
              <span class="w-2 h-2 rounded-full" :class="inferenceStatus.includes('Offline') ? 'bg-amber-500' : 'bg-emerald-500 animate-ping'"></span>
              <span class="text-[10px] font-mono text-slate-400" x-text="inferenceStatus">Inference Core Ready</span>
            </div>
          </div>

          <!-- Empty State -->
          <div x-show="!loader && !showResults" class="flex flex-col items-center justify-center py-20 text-center">
            <div class="w-12 h-12 rounded-full flex items-center justify-center mb-4 bg-slate-950/60 border" :class="darkMode ? 'border-slate-800' : 'border-slate-200'">
              <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
              </svg>
            </div>
            <h3 class="text-xs font-mono font-bold text-slate-400 uppercase">Awaiting Compliance Execution</h3>
            <p class="text-[11px] text-slate-500 max-w-xs mt-1">Configure inputs in the wizard panel and click run compliance to generate evaluation metrics.</p>
          </div>

          <!-- Loading State Animation -->
          <div x-show="loader" class="flex flex-col items-center justify-center py-20 text-center">
            <div class="w-8 h-8 rounded-full border-2 border-slate-700 border-t-brandNeon animate-spin mb-4"></div>
            <p class="text-xs font-mono text-slate-400">Simulating Public Response Matrices...</p>
          </div>

          <!-- Results Render State -->
          <div x-show="showResults && !loader" class="space-y-6">
            <!-- Score Gauge -->
            <div class="flex flex-col md:flex-row items-center gap-6 p-4 bg-slate-950/40 border rounded-lg" :class="darkMode ? 'border-slate-800' : 'border-slate-200'">
              <div class="w-20 h-20 rounded-full border-4 flex flex-col items-center justify-center flex-shrink-0"
                   :class="results.overall_score >= 90 ? 'border-emerald-500 text-emerald-400' : (results.overall_score >= 70 ? 'border-amber-500 text-amber-400' : 'border-red-500 text-red-400')">
                <span class="text-2xl font-black" x-text="results.overall_score"></span>
                <span class="text-[9px] font-bold font-mono">SCORE</span>
              </div>
              <div>
                <div class="flex items-center gap-2">
                  <span class="text-xs font-mono font-bold uppercase tracking-wider text-slate-400">Threat Evaluation:</span>
                  <span class="text-xs font-black uppercase tracking-wider px-2 py-0.5 rounded font-mono"
                        :class="results.risk_level.includes('Safe') ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : (results.risk_level === 'Caution' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20')"
                        x-text="results.risk_level"></span>
                </div>
                <p class="text-xs mt-2" :class="darkMode ? 'text-slate-300' : 'text-slate-600'" x-text="results.summary"></p>
              </div>
            </div>

            <!-- Slogan Preview Zone -->
            <div class="p-4 bg-slate-950/30 border rounded-lg" :class="darkMode ? 'border-slate-800' : 'border-slate-200'">
              <span class="text-[10px] font-mono uppercase text-slate-500">Evaluated Copy Slogan</span>
              <div class="text-xs mt-1.5 font-medium leading-relaxed" x-html="renderHighlightedSlogan()"></div>
            </div>

            <!-- Issues List -->
            <div>
              <h3 class="text-xs font-mono font-bold text-slate-400 uppercase mb-3">Flagged Contextual Anomalies</h3>
              <template x-if="results.flagged_issues.length === 0">
                <div class="text-xs text-slate-500 italic py-4 border border-dashed rounded text-center" :class="darkMode ? 'border-slate-800' : 'border-slate-200'">
                  Zero risk compliance triggers detected in input caption.
                </div>
              </template>
              <div class="space-y-3">
                <template x-for="issue in results.flagged_issues">
                  <div class="p-3 rounded border" 
                       :class="results.risk_level === 'Caution' ? 'bg-amber-500/5 border-amber-500/20' : 'bg-red-500/5 border-red-500/20'">
                    <div class="flex justify-between items-center text-xs font-semibold mb-1">
                      <span class="font-mono text-brandNeon" x-text="`“${issue.phrase}”`"></span>
                      <span class="text-[10px] text-slate-500 uppercase tracking-wider font-mono" x-text="issue.category"></span>
                    </div>
                    <p class="text-xs text-slate-300" x-text="issue.rationale"></p>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>

        <!-- Quick Demo Shortcut Button -->
        <div class="mt-8 pt-4 border-t flex justify-end" :class="darkMode ? 'border-slate-800' : 'border-slate-100'">
          <button 
            @click="brandContext='Holiday promotional advertisement campaigns for family-owned stores'; demographics='Tier 1 Market'; campaignCopy='Our sacred festive sale brings you cheap deals on modern home assets!'; selectedEngine='tier1'; sensitivity='Standard'; runComplianceCheck()"
            type="button"
            class="text-[11px] font-mono text-brandNeon hover:underline"
          >
            ⚡ Load Demo Risk Payload & Run
          </button>
        </div>
      </section>

    </div>



    <!-- Collapsible FAQ Accordion Section -->
    <section class="py-20 border-t" :class="darkMode ? 'border-slate-800/60' : 'border-slate-200'">
      <h2 class="text-2xl font-bold tracking-tight text-center mb-10" :class="darkMode ? 'text-white' : 'text-slate-900'">Frequently Asked Questions</h2>
      <div class="max-w-3xl mx-auto space-y-4">
        
        <div class="border rounded-lg overflow-hidden glass-card" :class="darkMode ? 'border-slate-800 bg-brandSurfaceDark/10' : 'border-slate-200 bg-white shadow-sm'">
          <button @click="faqOpen = (faqOpen === 1 ? null : 1)" class="w-full text-left p-4 font-semibold text-xs md:text-sm flex justify-between items-center transition" :class="darkMode ? 'hover:bg-slate-800/20' : 'hover:bg-slate-100/50'">
            <span>How does BrandCheck Pro catch sarcasm or cultural nuances that normal LLMs miss?</span>
            <span class="text-brandNeon font-bold" x-text="faqOpen === 1 ? '−' : '+'"></span>
          </button>
          <div class="accordion-content" :class="faqOpen === 1 ? 'open' : ''">
